<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Metrics Console</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="page-login">
  <main class="login-shell">
    <form id="loginForm" class="login-card" autocomplete="off" spellcheck="false">
      <input id="passphrase" type="password" placeholder="key"
             autocomplete="new-password" autocapitalize="off" spellcheck="false" required>
      <button type="submit" id="loginBtn">→</button>
      <div class="login-msg" id="loginMsg"></div>
    </form>
  </main>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
